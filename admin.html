<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <style>
    body {
      font-family: Arial;
      padding: 30px;
      background: #f7f7f7;
    }
    .card {
      background: white;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      max-width: 500px;
    }
    input, button {
      padding: 10px;
      margin-top: 10px;
      width: 100%;
      box-sizing: border-box;
    }
    button {
      cursor: pointer;
      background: #333;
      color: white;
      border: none;
      border-radius: 4px;
    }
    button:hover { background: #555; }
    pre {
      margin-top: 10px;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 13px;
    }
  </style>
</head>
<body>

<h2>Admin Panel</h2>

<div class="card">
  <h3>Admin Key</h3>
  <input type="password" id="key" placeholder="Enter Admin Key" />
</div>

<div class="card">
  <h3>Sheet Limit</h3>
  <input type="number" id="sheetLimit" placeholder="Enter sheet limit (default: 10)" min="1" max="100" />
  <button onclick="updateConfig()">Update Limit</button>
</div>

<div class="card">
  <h3>Upload Excel</h3>
  <input type="file" id="file" accept=".xlsx,.xls,.xlsm" />
  <button onclick="upload()">Upload File</button>
</div>

<div class="card">
  <h3>Current Data</h3>
  <button onclick="checkData()">Check Loaded Sheets</button>
  <pre id="status"></pre>
</div>

<script>
  // Works both locally (same origin) and on a hosted server.
  // If admin.html is served from the same Express app, leave this as ''.
  // If hosted separately, set this to your server's full URL.
  const BASE_URL = '';

  function getKey() {
    const key = document.getElementById('key').value.trim();
    if (!key) { alert('Please enter your Admin Key first.'); return null; }
    return key;
  }

  async function updateConfig() {
    const key = getKey();
    if (!key) return;

    const sheetLimit = document.getElementById('sheetLimit').value;
    if (!sheetLimit) { alert('Please enter a sheet limit.'); return; }

    try {
      const res = await fetch(`${BASE_URL}/config`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-admin-key': key           // ← fixed header name
        },
        body: JSON.stringify({ sheetLimit })
      });
      alert(await res.text());
    } catch (err) {
      alert('Error: ' + err.message);
    }
  }

  async function upload() {
    const key = getKey();
    if (!key) return;

    const file = document.getElementById('file').files[0];
    if (!file) { alert('Please select a file.'); return; }

    const formData = new FormData();
    formData.append('file', file);

    try {
      const res = await fetch(`${BASE_URL}/upload`, {
        method: 'POST',
        headers: {
          'x-admin-key': key           // ← fixed header name
        },
        body: formData
      });
      alert('Response: ' + await res.text());
    } catch (err) {
      alert('Error: ' + err.message);
    }
  }

  async function checkData() {
    try {
      const res = await fetch(`${BASE_URL}/data`);
      const json = await res.json();
      const sheets = Object.keys(json.sheets || {});
      document.getElementById('status').textContent =
        sheets.length ? sheets.join('\n') : 'No data loaded';
    } catch (err) {
      document.getElementById('status').textContent = 'Error: ' + err.message;
    }
  }
</script>

</body>
</html>
